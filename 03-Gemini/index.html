<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ömer Çetin Yalman - Gemini AI Tasarımı</title>
    <style>
        :root {
            --istiklal-lacivert: #1a2a44;
            --istiklal-altin: #c5a059;
            --glass-bg: rgba(255, 255, 255, 0.12);
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top right, #1a2a44, #0f172a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 320px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-top: 2px solid var(--istiklal-altin);
        }
        .uni-name {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--istiklal-altin);
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        h1 {
            font-size: 24px;
            margin: 5px 0;
            font-weight: 600;
        }
        .title {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 30px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            text-decoration: none;
            color: white;
            padding: 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            font-size: 14px;
        }
        .btn:hover {
            background: var(--istiklal-altin);
            color: var(--istiklal-lacivert);
            transform: translateY(-3px);
            font-weight: bold;
        }
        .footer {
            margin-top: 30px;
            font-size: 9px;
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="uni-name">Kahramanmaraş İstiklal Üniversitesi</div>
        <h1>ÖMER ÇETİN YALMAN</h1>
        <div class="title">Mühendislik Fakültesi Öğrencisi</div>
        
        <div class="links">
            <a href="#" class="btn">LinkedIn Profilim</a>
            <a href="#" class="btn">GitHub Portfolyo</a>
            <a href="https://istiklal.edu.tr" target="_blank" class="btn">Üniversite Web Sitesi</a>
        </div>

        <div class="footer">
            Generated by Gemini AI • 2026
        </div>
    </div>
</body>
</html>
